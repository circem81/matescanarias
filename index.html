<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruta Archipiélago 🇮🇨</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eaf7ff 0%, #dff2ff 100%);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      border-top: 10px solid #004477;
      border-bottom: 10px solid #ffd700;
    }

    .header {
      padding: 24px;
      text-align: center;
      border-bottom: 1px solid #eef2f7;
      position: relative;
    }

    .mute-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      border: none;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 18px;
    }

    h1 {
      margin: 0;
      color: #004477;
      font-size: 32px;
    }

    .subtitle {
      margin-top: 8px;
      color: #6b7280;
      font-weight: bold;
    }

    .top-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 16px 24px 8px;
      font-weight: bold;
      color: #004477;
      text-align: center;
    }

    .stat {
      background: #f8fbff;
      border: 1px solid #e5eef7;
      border-radius: 14px;
      padding: 10px;
    }

    .progress-wrap {
      width: calc(100% - 48px);
      margin: 8px 24px 0;
      height: 12px;
      background: #eef2f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffd700, #ffbf00);
      transition: width 0.35s ease;
    }

    .content {
      padding: 24px;
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      background: #dff3ff;
      color: #005b82;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .difficulty {
      float: right;
      background: #fff4cc;
      color: #8a6200;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .question {
      font-size: 22px;
      margin-bottom: 20px;
      font-weight: 600;
      line-height: 1.4;
      clear: both;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 16px;
      border: 2px solid #d1d5db;
      margin-bottom: 12px;
      outline: none;
    }

    input:focus {
      border-color: #004477;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.05s ease, opacity 0.2s ease;
    }

    button:active {
      transform: scale(0.99);
    }

    .primary { background: #004477; color: white; }
    .secondary { background: #059669; color: white; margin-top: 10px; }
    .restart { background: #004477; color: white; margin-top: 16px; }

    .feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      font-weight: bold;
      line-height: 1.4;
    }

    .correct {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .incorrect {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .hint {
      margin-top: 8px;
      font-size: 14px;
      font-weight: normal;
      font-style: italic;
    }

    .fact {
      margin-top: 14px;
      background: #fffbeb;
      border-left: 5px solid #f59e0b;
      padding: 12px 14px;
      border-radius: 0 12px 12px 0;
      color: #7c5200;
      line-height: 1.5;
    }

    .final {
      text-align: center;
      padding: 12px 0;
    }

    .final h2 {
      font-size: 30px;
      color: #004477;
      margin-bottom: 10px;
    }

    .final p {
      font-size: 18px;
      line-height: 1.5;
      color: #374151;
    }

    .big {
      font-size: 60px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <button id="muteBtn" class="mute-btn">🔊</button>
    <h1>Ruta Archipiélago 🇮🇨</h1>
    <div id="subtitle" class="subtitle"></div>
  </div>

  <div class="top-stats">
    <div class="stat">❤️ Vidas: <span id="lives">3</span></div>
    <div class="stat">🏆 Puntos: <span id="score">0</span></div>
  </div>

  <div class="progress-wrap">
    <div id="progressBar" class="progress"></div>
  </div>

  <div id="app" class="content"></div>
</div>

<script>
  const levels = [
    {
      island:"Lanzarote 🌵",
      difficulty:"Fácil",
      question:"3 kg de papas cuestan 6 €. ¿Cuánto costarán 8 kg?",
      answer:16,
      hint:"Proporcionalidad directa: más kilos, más dinero.",
      fact:"En Lanzarote se cultiva sobre picón volcánico para conservar mejor la humedad."
    },
    {
      island:"Fuerteventura 🧀",
      difficulty:"Fácil",
      question:"4 cabras comen 20 kg de forraje. ¿Cuántos kg necesitan 10 cabras?",
      answer:50,
      hint:"Si aumentan las cabras, aumenta la comida.",
      fact:"El queso majorero es uno de los grandes orgullos de Canarias."
    },
    {
      island:"Gran Canaria 🚌",
      difficulty:"Media",
      question:"Una guagua tarda 40 minutos a 90 km/h. Si va a 60 km/h, ¿cuántos minutos tardará?",
      answer:60,
      hint:"Menor velocidad, mayor tiempo: proporcionalidad inversa.",
      fact:"Las Palmas tiene una de las redes de guaguas más usadas de España."
    },
    {
      island:"Tenerife 🎭",
      difficulty:"Media",
      question:"Un disfraz cuesta 120 €. Si le hacen un 15 % de descuento, ¿cuánto dinero rebajan?",
      answer:18,
      hint:"Calcula el 15 % de 120.",
      fact:"El Carnaval de Santa Cruz es una fiesta internacionalmente famosa."
    },
    {
      island:"La Palma 🌋",
      difficulty:"Media",
      question:"6 camiones tardan 10 días en limpiar una zona. ¿Cuántos camiones hacen falta para hacerlo en 4 días?",
      answer:15,
      hint:"Menos días exige más camiones.",
      fact:"La Palma combina volcanes, bosques y cielos brutales."
    },
    {
      island:"La Gomera 🌿",
      difficulty:"Media",
      question:"En un mapa, 2 cm representan 5 km. Si una ruta mide 6 cm, ¿cuántos km son en realidad?",
      answer:15,
      hint:"Cada 2 cm son 5 km. Busca cuántos grupos de 2 hay en 6.",
      fact:"El silbo gomero permite comunicarse a gran distancia."
    },
    {
      island:"El Hierro ⚡",
      difficulty:"Difícil",
      question:"5 turbinas producen una cantidad de energía en 12 horas. ¿Cuántas horas tardarán 2 turbinas en producir lo mismo?",
      answer:30,
      hint:"Menos máquinas tardan más tiempo.",
      fact:"El Hierro es un referente en energías renovables."
    },
    {
      island:"La Graciosa 🚲",
      difficulty:"Difícil",
      question:"7 bicicletas tardan 8 días en repartir material. ¿Cuántos días tardarán 14 bicicletas haciendo el mismo trabajo?",
      answer:4,
      hint:"El doble de bicis, la mitad de tiempo.",
      fact:"La Graciosa tiene un ritmo tan tranquilo que hasta las prisas se bajan en el muelle."
    },
    {
      island:"La Palma 🔥",
      difficulty:"Difícil",
      question:"Un depósito se llena con 3 bombas en 12 horas. ¿Cuánto tardarán 4 bombas iguales?",
      answer:9,
      hint:"Más bombas, menos tiempo.",
      fact:"En Canarias la proporcionalidad también viaja con casco y pala."
    },
    {
      island:"Tenerife 🏔️",
      difficulty:"Difícil",
      question:"5 personas pagan 18 € cada una por una excursión. Si van 6 personas y el precio total es el mismo, ¿cuánto paga cada una?",
      answer:15,
      hint:"Primero calcula el precio total, luego reparte.",
      fact:"Hasta el Teide parece más alto cuando toca calcular sin calculadora."
    },
    {
      island:"Gran Canaria 📚",
      difficulty:"Experto",
      question:"Para fotocopiar un dossier, 8 impresoras iguales tardan 15 minutos. Si solo funcionan 5, ¿cuántos minutos tardarán?",
      answer:24,
      hint:"Trabajo fijo: impresoras por tiempo se compensa.",
      fact:"Las impresoras del instituto siempre detectan cuándo tienes prisa. Ciencia pura."
    },
    {
      island:"Fuerteventura 🌬️",
      difficulty:"Experto",
      question:"Un grupo recorre 18 km en 3 horas a ritmo constante. ¿Cuántos km recorrerá en 5 horas al mismo ritmo?",
      answer:30,
      hint:"Primero calcula cuántos km hace en 1 hora.",
      fact:"Aquí ya no es nivel 'uy qué mono', aquí ya sudan un poco."
    },
    {
      island:"Tenerife 🧮",
      difficulty:"Experto",
      question:"Si 12 lápices cuestan 18 €, ¿cuánto cuestan 20 lápices?",
      answer:30,
      hint:"Primero saca el precio de un lápiz.",
      fact:"Cuando aparece material escolar, la proporcionalidad sale de la mochila."
    },
    {
      island:"Gran Canaria 🧠",
      difficulty:"Experto",
      question:"Un coche recorre 150 km en 3 horas. ¿Cuántos km recorrerá en 7 horas?",
      answer:350,
      hint:"Velocidad constante: calcula cuántos km hace en 1 hora.",
      fact:"Aquí el que no entendió la razón unitaria empieza a mirar al compañero con fe."
    },
    {
      island:"La Palma 🔢",
      difficulty:"Experto",
      question:"5 obreros hacen un trabajo en 8 días. ¿Cuántos días tardarán 10 obreros?",
      answer:4,
      hint:"Más obreros, menos tiempo.",
      fact:"La proporcionalidad inversa viene con cara amable y luego te la lía."
    },
    {
      island:"El Hierro 🧩",
      difficulty:"Experto",
      question:"Si 2 kg de queso cuestan 5 €, ¿cuánto cuestan 9 kg?",
      answer:22.5,
      hint:"Calcula primero cuánto cuesta 1 kg.",
      fact:"Sí, aquí entran decimales. Respira y sigue."
    },
    {
      island:"La Gomera 🔥",
      difficulty:"Experto",
      question:"Un tren tarda 2 horas en recorrer 120 km. ¿Cuánto tardará en recorrer 300 km a la misma velocidad?",
      answer:5,
      hint:"Primero calcula la velocidad.",
      fact:"En este punto ya no es un juego: es una selección natural matemática."
    },
    {
      island:"Lanzarote 📦",
      difficulty:"Experto",
      question:"8 cajas pesan 56 kg. ¿Cuánto pesan 15 cajas iguales?",
      answer:105,
      hint:"Peso por caja y luego multiplica.",
      fact:"Las cajas siempre parecen inocentes hasta que toca dividir."
    },
    {
      island:"Fuerteventura 🐐",
      difficulty:"Experto",
      question:"9 sacos de pienso duran 12 días. ¿Cuántos días durarán 15 sacos al mismo ritmo?",
      answer:20,
      hint:"Más sacos, más días.",
      fact:"Aquí ya se ve quién domina directa e inversa sin pestañear."
    },
    {
      island:"Gran Canaria 🚢",
      difficulty:"Experto",
      question:"Una bomba extrae 240 litros en 6 minutos. ¿Cuántos litros extraerá en 15 minutos al mismo ritmo?",
      answer:600,
      hint:"Calcula litros por minuto.",
      fact:"Si has llegado aquí, ya casi tienes pasaporte matemático interinsular."
    }
  ];

  const sounds = {
    correct: new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3'),
    incorrect: new Audio('https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3'),
    next: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3')
  };

  let current = 0;
  let score = 0;
  let lives = 3;
  let muted = false;
  let answeredCorrectly = false;

  const app = document.getElementById("app");
  const subtitle = document.getElementById("subtitle");
  const progressBar = document.getElementById("progressBar");
  const livesEl = document.getElementById("lives");
  const scoreEl = document.getElementById("score");
  const muteBtn = document.getElementById("muteBtn");

  function playSound(name) {
    if (muted) return;
    const audio = sounds[name];
    if (!audio) return;
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }

  function updateTopBar() {
    livesEl.textContent = lives;
    scoreEl.textContent = score;
    progressBar.style.width = ((current / levels.length) * 100) + "%";
    subtitle.textContent = current < levels.length
      ? `Nivel ${current + 1} de ${levels.length}`
      : "Final";
  }

  function renderLevel() {
    updateTopBar();

    const level = levels[current];
    answeredCorrectly = false;

    app.innerHTML = `
      <div class="tag">${level.island}</div>
      <div class="difficulty">${level.difficulty}</div>
      <div class="question">${level.question}</div>
      <input id="ans" type="number" step="any" placeholder="Escribe tu respuesta..." />
      <button class="primary" id="checkBtn">Responder</button>
      <div id="feedbackBox"></div>
    `;

    document.getElementById("checkBtn").addEventListener("click", checkAnswer);
    document.getElementById("ans").addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkAnswer();
    });
  }

  function checkAnswer() {
    if (answeredCorrectly) return;

    const level = levels[current];
    const val = parseFloat(document.getElementById("ans").value);
    const feedbackBox = document.getElementById("feedbackBox");

    if (isNaN(val)) {
      feedbackBox.innerHTML = `
        <div class="feedback incorrect">
          Escribe un número válido.
          <div class="hint">No me pongas jeroglíficos matemáticos ahora.</div>
        </div>
      `;
      return;
    }

    if (Math.abs(val - level.answer) < 0.001) {
      answeredCorrectly = true;
      score += 10;
      playSound("correct");
      updateTopBar();

      feedbackBox.innerHTML = `
        <div class="feedback correct">
          ✔ Correcto. Has conquistado la isla.
        </div>
        <div class="fact">${level.fact}</div>
        <button class="secondary" id="nextBtn">Siguiente nivel</button>
      `;

      document.getElementById("nextBtn").addEventListener("click", nextLevel);
    } else {
      playSound("incorrect");
      loseLife("✘ Incorrecto.", level.hint);
    }
  }

  function loseLife(message, hint) {
    lives--;
    updateTopBar();

    const feedbackBox = document.getElementById("feedbackBox");
    if (feedbackBox) {
      feedbackBox.innerHTML = `
        <div class="feedback incorrect">
          ${message}
          <div class="hint">${hint}</div>
        </div>
      `;
    }

    if (lives <= 0) {
      showGameOver();
    }
  }

  function nextLevel() {
    playSound("next");
    current++;

    if (current >= levels.length) {
      showVictory();
      return;
    }

    renderLevel();
  }

  function showGameOver() {
    app.innerHTML = `
      <div class="final">
        <div class="big">💀</div>
        <h2>Game Over</h2>
        <p>Te has quedado sin vidas.</p>
        <p>Puntuación final: <strong>${score}</strong></p>
        <button class="restart" onclick="restartGame()">Reintentar</button>
      </div>
    `;
  }

  function showVictory() {
    progressBar.style.width = "100%";
    app.innerHTML = `
      <div class="final">
        <div class="big">🏆</div>
        <h2>¡Archipiélago completado!</h2>
        <p>Has superado los 20 problemas.</p>
        <p>Puntuación final: <strong>${score}</strong></p>
        <button class="restart" onclick="restartGame()">Volver a jugar</button>
      </div>
    `;
  }

  function restartGame() {
    current = 0;
    score = 0;
    lives = 3;
    renderLevel();
  }

  muteBtn.addEventListener("click", () => {
    muted = !muted;
    muteBtn.textContent = muted ? "🔇" : "🔊";
  });

  renderLevel();
</script>

</body>
</html>
