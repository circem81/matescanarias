<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mates Canarias</title>

<style>
:root{
  --bg:#0b1220;
  --text:#eaf0ff;
  --muted:#bcd1ff;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:20px;
}

.app{width:900px}

.card{
  background:rgba(255,255,255,.05);
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

select,input{
  width:100%;
  padding:8px;
  border-radius:8px;
  margin-top:5px;
}

button{
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
}

.message{margin-top:10px}

</style>
</head>

<body>

<div class="app">

<h1>Mates Canarias</h1>

<div class="card">

<label>Tema</label>
<select id="topic">
<option value="mixto">Mixto</option>
<option value="proporcionalidad">Proporcionalidad</option>
<option value="funciones">Funciones</option>
</select>

<label>Tipo</label>
<select id="relation">
<option value="">—</option>
<option value="directa">Directa</option>
<option value="inversa">Inversa</option>
<option value="funcion">Función</option>
</select>

<label>Estrategia</label>
<select id="step">
<option value="">—</option>
<option value="multiplica">Multiplicar</option>
<option value="divide">Dividir</option>
<option value="calcula">Calcular</option>
<option value="leer">Leer</option>
</select>

<div id="problem"></div>

<input id="answer" placeholder="Respuesta">

<button onclick="check()">Comprobar</button>
<button onclick="load()">Siguiente</button>

<div id="message" class="message"></div>

</div>

</div>

<script>

let current

const cases = [

{topic:'proporcionalidad',relation:'directa',step:'multiplica',
problem:'Si 3 cajas pesan 24 kg, ¿cuánto pesan 6?',
hint:'directa',
correct:48},

{topic:'proporcionalidad',relation:'inversa',step:'divide',
problem:'4 obreros tardan 12 días. ¿6 obreros?',
hint:'inversa',
correct:8},

{topic:'funciones',relation:'funcion',step:'calcula',
problem:'y = 2x + 1, x=3',
hint:'sustituye',
correct:7},

{topic:'funciones',relation:'funcion',step:'calcula',
problem:'y = 3x, x=4',
hint:'multiplica',
correct:12}

]

function load(){

const topic = document.getElementById('topic').value

let pool = cases

if(topic!=='mixto'){
  pool = cases.filter(c=>c.topic===topic)
}

current = pool[Math.floor(Math.random()*pool.length)]

document.getElementById('problem').innerText = current.problem
document.getElementById('answer').value=''
document.getElementById('message').innerText='Piensa...'
}

function check(){

const rel = document.getElementById('relation').value
const step = document.getElementById('step').value
const ans = Number(document.getElementById('answer').value)

if(rel!==current.relation){
  msg('Relación incorrecta')
  return
}

if(step!==current.step){
  msg('Estrategia incorrecta')
  return
}

if(ans===current.correct){
  msg('Bien +10')
}else{
  msg('Mal')
}

}

function msg(t){
document.getElementById('message').innerText=t
}

load()

</script>

</body>
</html>
