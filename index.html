<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Mates Canarias</title>
  <style>
    :root{
      --bg:#0b1220;
      --text:#eaf0ff;
      --muted:#bcd1ff;
    }
    body{margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; color:var(--text); background: radial-gradient(1200px 600px at 10% 10%, rgba(99,102,241,.25), transparent), radial-gradient(800px 600px at 90% 30%, rgba(56,189,248,.2), transparent), var(--bg); min-height: 100vh; display:flex; justify-content:center; padding: 18px;}
    .app{width:min(980px,100%);} 
    header{display:flex; justify-content:space-between; gap:12px; align-items:end; margin-bottom:12px;}
    h1{margin:0;font-size:24px;}
    .score{font-weight:700; color:var(--muted);}
    .grid{display:grid; gap:12px;}
    .card{background: rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:14px;}
    .titleRow{display:flex; justify-content:space-between; gap:8px; align-items:center; margin-bottom:8px;}
    .bar{height:10px;border-radius:999px; background: rgba(255,255,255,.07); overflow:hidden; margin-bottom:8px;}
    .fill{height:10px; background: linear-gradient(90deg, #22c55e, #06b6d4, #a855f7); width:0%;}
    .field{margin-top:8px;}
    .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:4px;}
    input, select{width:100%; border-radius:10px; border:1px solid rgba(255,255,255,.12); padding:10px 12px; background: rgba(255,255,255,.04); color:var(--text); font-size:15px; outline:none;}
    select{background: rgba(255,255,255,.9); color:#0b1220;}
    select option{color:#0b1220;}
    input::placeholder{color: rgba(234,240,255,.65);}
    input:focus, select:focus{border-color: rgba(56,189,248,.8); box-shadow:0 0 0 4px rgba(56,189,248,.15);} 
    .row{display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:8px;}
    .message{margin-top:10px; border-radius:10px; padding:10px 12px; border:1px solid transparent; background: rgba(255,255,255,.04); color:var(--muted);} 
    .message.good{border-color: rgba(45,212,191,.35); background: rgba(45,212,191,.08); color:#ccfbf1;}
    .message.bad{border-color: rgba(244,63,94,.35); background: rgba(244,63,94,.08); color:#ffe4e6;}
    .actions{display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;}
    button{border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); color: var(--text); padding:9px 12px; border-radius:10px; cursor:pointer; font-weight:650;}
    button.primary{background: rgba(56,189,248,.12); border-color: rgba(56,189,248,.4);} 
    button.good{background: rgba(45,212,191,.12); border-color: rgba(45,212,191,.4);} 
    button.danger{background: rgba(244,63,94,.12); border-color: rgba(244,63,94,.35);}
    .hintText{font-size:13px; color: var(--muted);} 
    @media (max-width:720px){
      .row{grid-template-columns: 1fr;}
      header{flex-direction:column; align-items:flex-start;}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Mates Canarias</h1>
        <div style="color:var(--muted); font-size:13px;">Comprender → Representar → Ejecutar</div>
      </div>
      <div class="score">Puntos: <span id="score">0</span></div>
    </header>

    <div class="grid">
      <div class="card">
        <div class="titleRow"><div style="font-weight:800;">Registro</div><div id="regSummary" style="font-size:13px; color:var(--muted);"></div></div>
        <div class="field">
          <label>Alias del alumno/a (sin apellidos)</label>
          <input id="alias" placeholder="ej: Proporcional_7A" autocomplete="off"/>
        </div>
        <div class="actions">
          <button id="saveAlias" class="good">Guardar alias</button>
          <button id="downloadCsv">Descargar CSV</button>
          <button id="emailReport" class="primary">Preparar email a profe</button>
          <button id="clearLogs" class="danger">Borrar registros</button>
        </div>
      </div>

      <div class="card">
        <div class="titleRow"><div style="font-weight:800;">Actividad</div><div class="hintText" id="hintText"></div></div>
        <div class="bar"><div class="fill" id="fill"></div></div>

        <div class="row">
          <div class="field">
            <label>1) Relación</label>
            <select id="relation">
              <option value="">—</option>
              <option value="directa">Proporcionalidad directa</option>
              <option value="inversa">Proporcionalidad inversa</option>
            </select>
          </div>
          <div class="field">
            <label>2) Representación</label>
            <select id="step">
              <option value="">—</option>
              <option value="multiplica">Multiplicar el valor conocido</option>
              <option value="divide">Dividir el valor conocido</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Problema</label>
          <div id="problem" style="color: var(--text); font-size:15px; line-height:1.4;"></div>
        </div>

        <div class="field">
          <label>3) Resultado (escribe solo número)</label>
          <input id="answer" inputmode="decimal" placeholder="0" />
        </div>

        <div class="actions">
          <button id="hintBtn">Pista (-2)</button>
          <button id="checkBtn" class="primary">Comprobar</button>
          <button id="nextBtn" class="good">Siguiente</button>
        </div>
        <div class="message" id="message"></div>
      </div>
    </div>
  </div>

<script>
 const TEACHER_EMAIL = 'cmoncabs@canariaseducacion.es';

  const aliasEl = document.getElementById('alias');
  const regSummaryEl = document.getElementById('regSummary');
  const saveAliasBtn = document.getElementById('saveAlias');
  const downloadCsvBtn = document.getElementById('downloadCsv');
  const emailReportBtn = document.getElementById('emailReport');
  const clearLogsBtn = document.getElementById('clearLogs');

  const relationEl = document.getElementById('relation');
  const stepEl = document.getElementById('step');
  const problemEl = document.getElementById('problem');
  const answerEl = document.getElementById('answer');
  const messageEl = document.getElementById('message');
  const hintTextEl = document.getElementById('hintText');
  const fillEl = document.getElementById('fill');
  const scoreEl = document.getElementById('score');

  const hintBtn = document.getElementById('hintBtn');
  const checkBtn = document.getElementById('checkBtn');
  const nextBtn = document.getElementById('nextBtn');

  function safeParse(num) {
    if (typeof num === 'number') return num;
    if (!num) return NaN;
    return Number(String(num).replace(',', '.'));
  }

  function format(n) {
    const v = safeParse(n);
    if (!Number.isFinite(v)) return String(n);
    if (Math.abs(v) >= 1000) return Math.round(v).toString();
    return v % 1 === 0 ? String(Math.round(v)) : v.toFixed(2);
  }

  var state = {
    alias: '',
    score: 0,
    logs: []
  };

  function saveLogs() {
    try {
      localStorage.setItem('mates_canarias_logs', JSON.stringify(state.logs.slice(-500)));
      localStorage.setItem('mates_canarias_alias', state.alias || '');
    } catch (e) {}
  }

  function loadLogs() {
    try {
      var raw = localStorage.getItem('mates_canarias_logs');
      var alias = localStorage.getItem('mates_canarias_alias');
      if (raw) state.logs = JSON.parse(raw);
      if (alias) {
        state.alias = alias;
        aliasEl.value = alias;
      }
    } catch (e) {
      state.logs = [];
    }
    renderRegSummary();
  }

  function ensureAlias() {
    var alias = (aliasEl.value || state.alias || '').trim();
    if (!alias) {
      setMessage('bad', 'Pon un alias primero (sin apellidos).');
      aliasEl.focus();
      return false;
    }
    state.alias = alias;
    aliasEl.value = alias;
    localStorage.setItem('mates_canarias_alias', alias);
    return true;
  }

  function renderRegSummary() {
    var total = state.logs.length;
    if (!total) {
      regSummaryEl.textContent = '';
      return;
    }
    var last = state.logs[total - 1];
    regSummaryEl.textContent = 'Registros guardados: ' + total + '. Último: ' + new Date(last.ts).toLocaleString();
  }

  function addLog(entry) {
    var alias = state.alias || '(sin_alias)';
    state.logs.push(Object.assign({}, entry, {alias: alias}));
    saveLogs();
    renderRegSummary();
  }

  function downloadCsv() {
    if (!state.logs.length) {
      setMessage('bad', 'No hay registros aún. Haz algún intento primero.');
      return;
    }
    var header = ['fecha','alias','caso','relacion','paso','respuesta','correcta','resultado','puntos despues'];
    var rows = state.logs.map(function(l){
      return [
        new Date(l.ts).toISOString(),
        l.alias,
        l.caseType || '',
        l.relation || '',
        l.step || '',
        l.answer || '',
        l.correct || '',
        l.outcome || '',
        l.scoreAfter || ''
      ];
    });
    var csv = [header.join(','), rows.map(function(r){return r.map(function(x){return '"' + String(x).replace(/"/g,'""') + '"';}).join(',');}).join('\n')].join('\n');
    var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'mates_registro_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    setTimeout(function(){URL.revokeObjectURL(url);}, 1000);
  }

  function emailReport() {
    if (!state.logs.length) {
      setMessage('bad', 'No hay registros aún. Haz algún intento primero.');
      return;
    }
    var alias = state.alias || aliasEl.value || '(sin_alias)';
    var total = state.logs.length;
    var correctos = state.logs.filter(function(l){return l.outcome === 'correcto';}).length;
    var incorrectos = state.logs.filter(function(l){return l.outcome !== 'correcto';}).length;
    var ultima = state.logs[state.logs.length - 1];
    var bodyLines = [
      'Alias: ' + alias,
      'Intentos: ' + total,
      'Correctos: ' + correctos,
      'Otros: ' + incorrectos,
      'Último: ' + new Date(ultima.ts).toLocaleString(),
      '',
      'Último intento:',
      'Caso: ' + ultima.caseType,
      'Relación: ' + ultima.relation,
      'Paso: ' + ultima.step,
      'Respuesta: ' + ultima.answer,
      'Correcta: ' + ultima.correct,
      'Resultado: ' + ultima.outcome,
      'Puntos después: ' + ultima.scoreAfter
    ];
    var subject = encodeURIComponent('[MatesCanarias] Registro ' + alias);
    var body = encodeURIComponent(bodyLines.join('\n'));
    window.location.href = 'mailto:' + TEACHER_EMAIL + '?subject=' + subject + '&body=' + body;
  }

  function clearLogs() {
    if (!confirm('¿Seguro que quieres borrar todos los registros de este dispositivo?')) return;
    state.logs = [];
    saveLogs();
    renderRegSummary();
    setMessage('warn', 'Registros borrados del navegador.');
  }
 var cases = [
    function(){
      var m = 5000;
      var real = 8000; // metros
      var map = real / m;
      return {
        caseType: 'escala',
        relation: 'directa',
        step: 'divide',
        problem: 'En un mapa de escala 1:' + m + ', 8 km en la realidad son ___ cm en el mapa (recuerda: 1 cm = 100 m).',
        hint: 'La escala 1:' + m + ' significa que 1 unidad en el mapa equivale a ' + m + ' en la realidad. Si tienes la realidad y quieres el mapa, DIVIDES.',
        correct: map * 100
      };
    },
    function(){
      var box = 24;
      var total = 6;
      var needed = box * total / 3;
      return {
        caseType: 'proporcionalidad directa',
        relation: 'directa',
        step: 'multiplica',
        problem: 'Si 3 cajas pesan ' + box + ' kg, ¿cuánto pesarán ' + total + ' cajas?',
        hint: 'Más cajas → más peso. Relación directa. Ajusta multiplicando.',
        correct: needed
      };
    },
    function(){
      var workers = 4;
      var days = 12;
      var tWorkers = 6;
      var tDays = workers * days / tWorkers;
      return {
        caseType: 'proporcionalidad inversa',
        relation: 'inversa',
        step: 'divide',
        problem: workers + ' personas tardan ' + days + ' días en terminar una tarea. Si trabajaran ' + tWorkers + ' personas, ¿cuántos días tardarían?',
        hint: 'Más personas → menos días. Relación inversa. Ajusta dividiendo.',
        correct: tDays
      };
    }
  ];

  var current = null;

  function setProgress(step) {
    var map = {1: 20, 2: 55, 3: 100};
    fillEl.style.width = (map[step] || 0) + '%';
  }

  function setMessage(kind, text) {
    messageEl.className = 'message';
    if (kind === 'good') messageEl.classList.add('good');
    if (kind === 'bad') messageEl.classList.add('bad');
    messageEl.textContent = text;
  }

  function load() {
    relationEl.value = '';
    stepEl.value = '';
    answerEl.value = '';
    setProgress(1);
    var idx = Math.floor(Math.random() * cases.length);
    current = cases[idx]();
    problemEl.textContent = current.problem;
    hintTextEl.textContent = '';
    setMessage('', 'Piensa antes de escribir 😉');
  }

  function hint() {
    if (!ensureAlias()) return;
    if (!current) return;
    state.score -= 2;
    scoreEl.textContent = state.score;
    hintTextEl.textContent = current.hint;
    setMessage('warn', 'Pista usada: -2 puntos.');
    addLog({
      ts: Date.now(),
      caseType: current.caseType,
      relation: relationEl.value || '(sin_relacion)',
      step: stepEl.value || '(sin_paso)',
      answer: '(pista)',
      correct: format(current.correct),
      outcome: 'pista',
      scoreAfter: state.score
    });
  }

  function check() {
    if (!ensureAlias()) return;
    if (!current) return;

    var rel = relationEl.value;
    var st = stepEl.value;
    var ansStr = (answerEl.value || '').trim();
    var correctVal = current.correct;
    var outcome = 'faltan_datos';

    if (!rel || !st || !ansStr) outcome = 'faltan_datos';
    else if (rel !== current.relation) outcome = 'fase1_mal';
    else if (st !== current.step) outcome = 'fase2_mal';
    else {
      var n = safeParse(ansStr);
      if (Number.isNaN(n)) outcome = 'numero_invalido';
      else {
        var diff = Math.abs(n - current.correct);
        if (diff <= 0.05 * Math.max(1, current.correct)) outcome = 'correcto';
        else outcome = 'incorrecto';
      }
    }

    if (outcome === 'faltan_datos') setMessage('bad', 'Te falta completar alguna fase.');
    else if (outcome === 'fase1_mal') { setMessage('bad', 'Fase 1 incorrecta. Relee el problema.'); setProgress(1); }
    else if (outcome === 'fase2_mal') { setMessage('bad', 'Fase 2 incorrecta. Piensa si toca multiplicar o dividir.'); setProgress(2); }
    else if (outcome === 'numero_invalido') setMessage('bad', 'Escribe solo números (puedes usar coma o punto).');
    else if (outcome === 'correcto') { state.score += 10; setMessage('good', '¡Bien! +10 puntos'); setProgress(3); }
    else if (outcome === 'incorrecto') { state.score -= 3; setMessage('bad', 'No es correcto. -3 puntos'); setProgress(3); }

    scoreEl.textContent = state.score;

    addLog({
      ts: Date.now(),
      caseType: current.caseType,
      relation: rel || '-',
      step: st || '-',
      answer: ansStr || '-',
      correct: correctVal == null ? '-' : format(correctVal),
      outcome: outcome,
      scoreAfter: state.score
    });
  }

  function next() { load(); }

  saveAliasBtn.addEventListener('click', function(){
    var ok = ensureAlias();
    if (ok) setMessage('good', 'Alias guardado ✅');
  });

  downloadCsvBtn.addEventListener('click', downloadCsv);
  emailReportBtn.addEventListener('click', emailReport);
  clearLogsBtn.addEventListener('click', clearLogs);

  hintBtn.addEventListener('click', function(e){ e.preventDefault(); hint(); }, true);
  checkBtn.addEventListener('click', function(e){ e.preventDefault(); check(); }, true);
  nextBtn.addEventListener('click', function(e){ e.preventDefault(); next(); }, true);

  answerEl.addEventListener('keydown', function(e){ if (e.key === 'Enter') check(); });

  loadLogs();
  load();
</script>
</body>
</html>
