<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruta Archipiélago 🇮🇨</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eaf7ff 0%, #dff2ff 100%);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      border-top: 10px solid #004477;
      border-bottom: 10px solid #ffd700;
    }

    .header {
      padding: 24px;
      text-align: center;
      border-bottom: 1px solid #eef2f7;
      position: relative;
    }

    .mute-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      border: none;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 18px;
    }

    h1 {
      margin: 0;
      color: #004477;
      font-size: 32px;
    }

    .subtitle {
      margin-top: 8px;
      color: #6b7280;
      font-weight: bold;
    }

    .top-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 16px 24px 8px;
      font-weight: bold;
      color: #004477;
      text-align: center;
    }

    .stat {
      background: #f8fbff;
      border: 1px solid #e5eef7;
      border-radius: 14px;
      padding: 10px;
    }

    .progress-wrap {
      width: calc(100% - 48px);
      margin: 8px 24px 0;
      height: 12px;
      background: #eef2f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffd700, #ffbf00);
      transition: width 0.35s ease;
    }

    .content { padding: 24px; }

    .panel {
      border-top: 1px solid #eef2f7;
      padding-top: 12px;
      padding-bottom: 0;
    }

    .panel h3 {
      margin: 0 0 10px 0;
      color: #004477;
    }

    .panel small {
      color: #6b7280;
      display: block;
      margin-top: 6px;
      line-height: 1.4;
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      background: #dff3ff;
      color: #005b82;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .difficulty {
      float: right;
      background: #fff4cc;
      color: #8a6200;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .question {
      font-size: 22px;
      margin-bottom: 20px;
      font-weight: 600;
      line-height: 1.4;
      clear: both;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 16px;
      border: 2px solid #d1d5db;
      margin-bottom: 12px;
      outline: none;
    }

    input:focus { border-color: #004477; }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.05s ease, opacity 0.2s ease;
    }

    button:active { transform: scale(0.99); }

    .primary { background: #004477; color: white; }
    .secondary { background: #059669; color: white; margin-top: 10px; }
    .restart { background: #004477; color: white; margin-top: 16px; }

    .feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      font-weight: bold;
      line-height: 1.4;
    }

    .correct {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .incorrect {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .hint { margin-top: 8px; font-size: 14px; font-weight: normal; font-style: italic; }

    .fact {
      margin-top: 14px;
      background: #fffbeb;
      border-left: 5px solid #f59e0b;
      padding: 12px 14px;
      border-radius: 0 12px 12px 0;
      color: #7c5200;
      line-length: 1.5;
    }

    .final { text-align: center; padding: 12px 0; }

    .final h2 { font-size: 30px; color: #004477; margin-bottom: 10px; }

    .final p { font-size: 18px; line-height: 1.5; color: #374151; }

    .big { font-size: 60px; margin-bottom: 8px; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <button id="muteBtn" class="mute-btn">🔊</button>
    <h1>Ruta Archipiélago 🇮🇨</h1>
    <div id="subtitle" class="subtitle"></div>
  </div>

  <div class="top-stats">
    <div class="stat">❤️ Vidas: <span id="lives">3</span></div>
    <div class="stat">🏆 Puntos: <span id="score">0</span></div>
    <div class="stat">⏱️ Tiempo: <span id="timer">90</span></div>
  </div>

  <div class="progress-wrap">
    <div id="progressBar" class="progress"></div>
  </div>

  <div id="registerBox" class="content panel">
    <h3>Registro del alumnado</h3>
    <input id="studentName" type="text" placeholder="Nombre (o apodo) para ranking" />
    <button id="registerBtn" class="secondary">Entrar</button>
    <small>Consejo: entra antes de jugar si quieres que te cuente el registro.</small>
  </div>

  <div id="rankingBox" class="content panel">
    <h3>Ranking</h3>
    <ol id="rankingList"></ol>
  </div>

  <div id="app" class="content"></div>
</div>

<script>

      answer:30,

    },
    {

      time:68,
      question:"8 cajas pesan 56 kg. ¿Cuánto pesan 15 cajas iguales?",
      answer:105,

    },
    {

      difficulty:"Difícil",
      time:65,

      answer:15,

      time:62,

    },
    {

      time:54,

      answer:22.5,

    {

      difficulty:"Experto",
      time:52,
      question:"5 obreros hacen un trabajo en 8 días. ¿Cuántos días tardarán 10 obreros?",
      answer:4,

      fact:"La inversa ya está aquí y no ha venido a saludar."
    },
    {
      island:"Fuerteventura 🐐",
      difficulty:"Experto",
      time:50,
      question:"Una bomba extrae 240 litros en 6 minutos. ¿Cuántos litros extraerá en 15 minutos al mismo ritmo?",
      answer:600,
      unit:"litros",
      hint:"Calcula litros por minuto.",
      fact:"Ya huele a examen, pero con banderita canaria."
    },
    {
      island:"Gran Canaria 🚢",
      difficulty:"Experto",
      time:48,
      question:"7 bicicletas tardan 8 días en repartir material. ¿Cuántos días tardarán 14 bicicletas haciendo el mismo trabajo?",
      answer:4,
      unit:"días",
      hint:"El doble de bicis, la mitad de tiempo.",
      fact:"Aquí ya deberían empezar a sentir respeto matemático."
    },
    {
      island:"Tenerife 🧠",
      difficulty:"Experto",
      time:46,
      question:"5 turbinas producen una cantidad de energía en 12 horas. ¿Cuántas horas tardarán 2 turbinas en producir lo mismo?",
      answer:30,
      unit:"horas",
      hint:"Menos máquinas tardan más tiempo.",
      fact:"Este problema no muerde, pero enseña los dientes."
    },
    {
      island:"La Palma 🧪",
      difficulty:"Experto",
      time:45,
      question:"Un coche recorre 150 km en 3 horas. ¿Cuántos km recorrerá en 7 horas a velocidad constante?",
      answer:350,
      unit:"km",
      hint:"Primero calcula cuántos km hace en 1 hora.",
      fact:"Aquí el que domina la razón unitaria va como un cohete."
    },
    {
      island:"Archipiélago Final 🏆",
      difficulty:"Jefa final",
      time:45,
      question:"Si 4 operarios montan 12 mesas en 3 horas, ¿cuántas mesas montarán 6 operarios en 5 horas manteniendo el mismo ritmo?",
      answer:30,
      unit:"mesas",
      hint:"Primero calcula cuántas mesas monta 1 operario en 1 hora.",
      fact:"Si han llegado aquí, ya no son alumnado: son supervivientes."
    }
  ];

  const RANK_KEY = "archipielagoRanking";
  const studentNameInput = document.getElementById("studentName");
  const registerBtn = document.getElementById("registerBtn");
  const rankingList = document.getElementById("rankingList");

  function getRankData() {
    try {
      return JSON.parse(localStorage.getItem(RANK_KEY) || "{}");
    } catch {
      return {};
    }
  }

  function saveRankData(data) {
    localStorage.setItem(RANK_KEY, JSON.stringify(data));
  }

  function renderRanking() {
    const data = getRankData();
    const sorted = Object.entries(data)
      .map(([name, info]) => ({
        name,
        bestScore: info?.bestScore ?? 0,
        connections: info?.connections ?? 0,
        lastConnection: info?.lastConnection ?? ""
      }))
      .sort((a, b) => {
        if (b.bestScore !== a.bestScore) return b.bestScore - a.bestScore;
        return b.connections - a.connections;
      });

    rankingList.innerHTML = "";

    if (sorted.length === 0) {
      rankingList.innerHTML = "<li>Aún no hay registros.</li>";
      return;
    }

    sorted.forEach((r, index) => {
      let medal = "";
      if (index === 0) medal = "🥇 ";
      else if (index === 1) medal = "🥈 ";
      else if (index === 2) medal = "🥉 ";

      const li = document.createElement("li");
      li.innerHTML = `${medal}<strong>${r.name}</strong> — mejor puntuación: <strong>${r.bestScore}</strong> | conexiones: ${r.connections}`;
      rankingList.appendChild(li);
    });
  }

  function registerConnection() {
    const name = studentNameInput.value.trim();
    if (!name) {
      alert("Pon un nombre (o apodo) para el ranking.");
      return;
    }

    const data = getRankData();
    if (!data[name]) {
      data[name] = { bestScore: 0, connections: 0, lastConnection: "" };
    }

    data[name].connections = (data[name].connections ?? 0) + 1;
    data[name].lastConnection = new Date().toLocaleString("es-ES");

    saveRankData(data);
    renderRanking();

    studentNameInput.value = "";
  }

  function saveBestScoreFromUI(score) {
    const nameField = document.getElementById("studentName");
    if (!nameField) return;

    const name = nameField.value.trim();
    if (!name) return;

    const data = getRankData();
    if (!data[name]) data[name] = { bestScore: 0, connections: 0, lastConnection: "" };

    if ((data[name].bestScore ?? 0) < score) {
      data[name].bestScore = score;
      data[name].lastConnection = new Date().toLocaleString("es-ES");
      saveRankData(data);
      renderRanking();
    }
  }

  registerBtn.addEventListener("click", registerConnection);
  studentNameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") registerConnection();
  });

  const sounds = {
    correct: new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3'),
    incorrect: new Audio('https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3'),
    next: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3')
  };

  let current = 0;
  let score = 0;
  let lives = 3;
  let muted = false;
  let answeredCorrectly = false;
  let timeLeft = 90;
  let timerId = null;

  const app = document.getElementById("app");
  const subtitle = document.getElementById("subtitle");
  const progressBar = document.getElementById("progressBar");
  const livesEl = document.getElementById("lives");
  const scoreEl = document.getElementById("score");
  const timerEl = document.getElementById("timer");
  const muteBtn = document.getElementById("muteBtn");

  function playSound(name) {
    if (muted) return;
    const audio = sounds[name];
    if (!audio) return;
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }

  function updateTopBar() {
    livesEl.textContent = lives;
    scoreEl.textContent = score;
    timerEl.textContent = timeLeft;
    progressBar.style.width = ((current / levels.length) * 100) + "%";
    subtitle.textContent = current < levels.length
      ? `Nivel ${current + 1} de ${levels.length}`
      : "Final";
  }

  function startTimer() {
    clearInterval(timerId);
    const level = levels[current];
    timeLeft = level.time ?? 90;
    updateTopBar();

    timerId = setInterval(() => {
      timeLeft--;
      updateTopBar();
      if (timeLeft <= 0) {
        clearInterval(timerId);
        loseLife("⏰ Se acabó el tiempo.", "Piensa rápido (pero con cabeza).");
      }
    }, 1000);
  }

  function renderLevel() {
    updateTopBar();
    const level = levels[current];
    answeredCorrectly = false;

    app.innerHTML = `
      <div class="tag">${level.island}</div>
      <div class="difficulty">${level.difficulty}</div>
      <div class="question">${level.question}</div>
      <input id="ans" type="text" placeholder="ej: 30 ${level.unit}" />
      <button class="primary" id="checkBtn">Responder</button>
      <div id="feedbackBox"></div>
    `;

    document.getElementById("checkBtn").addEventListener("click", checkAnswer);
    document.getElementById("ans").addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkAnswer();
    });

    startTimer();
  }

  function formatAnswer(level) {
    return Number(level.answer).toLocaleString("es-ES", {
      maximumFractionDigits: 3
    });
  }

  function difficultyBonus(level) {
    const map = {
      "Fácil": 2,
      "Media": 5,
      "Difícil": 9,
      "Experto": 14,
      "Jefa final": 18
    };
    return map[level.difficulty] || 0;
  }

  function sanitizeInput(raw, unit) {
    let s = (raw ?? "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase();

    // Comma decimal -> dot
    s = s.replace(/,/g, ".");

    // Remove spaces
    s = s.replace(/\s+/g, "");

    // Remove currency & common unit words
    s = s
      .replace(/€/g, "")
      .replace(/eur(os)?/g, "")
      .replace(/euro(s)?/g, "")
      .replace(/kg/g, "")
      .replace(/kilogram(o|os)?/g, "")
      .replace(/km/g, "")
      .replace(/kilometro(s)?/g, "")
      .replace(/min(uto)?(s)?/g, "")
      .replace(/hora(s)?/g, "")
      .replace(/dia(s)?/g, "")
      .replace(/mesa(s)?/g, "")
      .replace(/camion(es)?/g, "")
      .replace(/litro(s)?/g, "")
      .replace(/porciento/g, "")
      .replace(/%/g, "");

    if (unit) {
      const u = unit
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
      if (u) {
        s = s.replace(new RegExp(u.replace(/[-/\\^$*+?.()|[\]{}]/g, "\\$&"), "g"), "");
      }
    }

    // Remove anything that's not number-ish
    s = s.replace(/[^0-9.\-]/g, "");

    return parseFloat(s);
  }

  function checkAnswer() {
    if (answeredCorrectly) return;

    const level = levels[current];
    const val = sanitizeInput(document.getElementById("ans").value, level.unit);
    const feedbackBox = document.getElementById("feedbackBox");

    if (isNaN(val)) {
      feedbackBox.innerHTML = `
        <div class="feedback incorrect">
          Escribe una respuesta válida (número + unidad opcional).
          <div class="hint">Ejemplos válidos: 30, 30 km, 22.5 €</div>
        </div>
      `;
      return;
    }

    if (Math.abs(val - level.answer) < 0.001) {
      answeredCorrectly = true;
      clearInterval(timerId);
      score += 10 + timeLeft + difficultyBonus(level);
      playSound("correct");
      updateTopBar();

      feedbackBox.innerHTML = `
        <div class="feedback correct">
          ✔ Correcto. Has conquistado la isla.<br>
          Solución: <strong>${formatAnswer(level)} ${level.unit}</strong>
        </div>
        <div class="fact">${level.fact}</div>
        <button class="secondary" id="nextBtn">Siguiente nivel</button>
      `;

      document.getElementById("nextBtn").addEventListener("click", nextLevel);
    } else {
      playSound("incorrect");
      loseLife("✘ Incorrecto.", level.hint);
    }
  }

  function loseLife(message, hint) {
    lives--;
    updateTopBar();

    const feedbackBox = document.getElementById("feedbackBox");
    if (feedbackBox) {
      feedbackBox.innerHTML = `
        <div class="feedback incorrect">
          ${message}
          <div class="hint">${hint}</div>
        </div>
      `;
    }

    if (lives <= 0) {
      showGameOver();
    }
  }

  function nextLevel() {
    playSound("next");
    current++;

    if (current >= levels.length) {
      showVictory();
      return;
    }

    renderLevel();
  }

  function showGameOver() {
    clearInterval(timerId);
    saveBestScoreFromUI(score);

    app.innerHTML = `
      <div class="final">
        <div class="big">💀</div>
        <h2>Game Over</h2>
        <p>Te has quedado sin vidas.</p>
        <p>Puntuación final: <strong>${score}</strong></p>
        <button class="restart" onclick="restartGame()">Reintentar</button>
      </div>
    `;
  }

  function showVictory() {
    clearInterval(timerId);
    progressBar.style.width = "100%";

    saveBestScoreFromUI(score);

    app.innerHTML = `
      <div class="final">
        <div class="big">🏆</div>
        <h2>¡Archipiélago completado!</h2>
        <p>Has superado los ${levels.length} problemas.</p>
        <p>Puntuación final: <strong>${score}</strong></p>
        <button class="restart" onclick="restartGame()">Volver a jugar</button>
      </div>
    `;
  }

  function restartGame() {
    clearInterval(timerId);
    current = 0;
    score = 0;
    lives = 3;
    timeLeft = 90;
    renderLevel();
  }

  muteBtn.addEventListener("click", () => {
    muted = !muted;
    muteBtn.textContent = muted ? "🔇" : "🔊";
  });

  renderRanking();
  renderLevel();
</script>

</body>
</html>
