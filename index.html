<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruta Archipiélago 🇮🇨</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #eaf7ff;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      border-top: 10px solid #004477;
      border-bottom: 10px solid #ffd700;
    }

    .header {
      padding: 24px;
      text-align: center;
      border-bottom: 1px solid #eef2f7;
      position: relative;
    }

    .mute-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      border: none;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 18px;
    }

    h1 {
      margin: 0;
      color: #004477;
      font-size: 32px;
    }

    .subtitle {
      margin-top: 8px;
      color: #6b7280;
      font-weight: bold;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: #eef2f7;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #ffd700;
      transition: width 0.35s ease;
    }

    .content { padding: 24px; }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      background: #dff3ff;
      color: #005b82;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .question {
      font-size: 21px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 16px;
      border: 2px solid #d1d5db;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary { background: #004477; color: white; }
    .secondary { background: #059669; color: white; }

    .correct { color: green; }
    .incorrect { color: red; }
  </style>
</head>

<body>

<div class="card">
  <div class="header">
    <button id="muteBtn" class="mute-btn">🔊</button>
    <h1>Ruta Archipiélago 🇮🇨</h1>
    <div id="subtitle"></div>
  </div>

  <div class="progress-wrap">
    <div id="progressBar" class="progress"></div>
  </div>

  <div id="app" class="content"></div>
</div>

<script>
const levels = [
  { island:"Lanzarote 🌵", question:"3 kg cuestan 6€. ¿8 kg?", answer:16 },
  { island:"Fuerteventura 🧀", question:"4 cabras → 20kg. ¿10 cabras?", answer:50 },
  { island:"Gran Canaria 🚌", question:"90 km/h → 40 min. ¿60 km/h?", answer:60 }
];

let i = 0;

function render() {
  const level = levels[i];

  document.getElementById("subtitle").innerText = "Nivel " + (i+1);
  document.getElementById("progressBar").style.width =
    (i/levels.length*100)+"%";

  document.getElementById("app").innerHTML = `
    <div class="tag">${level.island}</div>
    <div class="question">${level.question}</div>
    <input id="ans" placeholder="respuesta"/>
    <button class="primary" onclick="check()">Responder</button>
    <div id="fb"></div>
  `;
}

function check(){
  const val = parseFloat(document.getElementById("ans").value);

  if(val === levels[i].answer){
    document.getElementById("fb").innerHTML =
      '<div class="correct">✔ Correcto</div>' +
      '<button class="secondary" onclick="next()">Siguiente</button>';
  } else {
    document.getElementById("fb").innerHTML =
      '<div class="incorrect">✘ Intenta otra vez</div>';
  }
}

function next(){
  i++;

  if(i >= levels.length){
    document.getElementById("app").innerHTML = "<h2>🏆 Terminado</h2>";
    return;
  }

  render();
}

render();
</script>

</body>
</html>
